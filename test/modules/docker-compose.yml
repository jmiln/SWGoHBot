version: '3.8'

services:
  mongodb-test:
    image: mongo:7.0
    container_name: swgohbot-test-mongodb
    ports:
      - "27018:27017"  # Use port 27018 to avoid conflict with production
    environment:
      - MONGO_INITDB_DATABASE=test_db
    volumes:
      - mongodb-test-data:/data/db
    command: mongod --quiet  # Reduce log noise
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mongodb-test-data:
    name: swgohbot-test-db-volume
